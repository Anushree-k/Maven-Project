# This workflow will build a package using Maven and then publish it to GitHub packages when a release/ PUSH is created

name: Maven Package

on:
  release:
    types: [created]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{matrix.os}}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      run: mvn -B clean package
    
    - name: Upload the jar file to target directory
      uses: actions/upload-artifact@v4
      with:
        name: artifact-SNAPSHOT-${{matrix.os}}-${{github.run_number}}-${{github.run_id}}
        path: target/*.jar
        
    - name: Execute the java file
      run: java -jar target/*.jar
      